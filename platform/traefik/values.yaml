traefik:
  deployment:
    replicas: 2

  ports:
    web:
      allowACMEByPass: true
    websecure:
      asDefault: true
      allowACMEByPass: true
      http:
        middlewares:
          - traefik-crowdsec@kubernetescrd

  service:
    spec:
      externalTrafficPolicy: Local
      loadBalancerIP: 192.168.5.64

  ingressRoute:
    dashboard:
      enabled: true
      entryPoints:
      - traefik

  accessLog:
    enabled: true

  experimental:
    plugins:
      crowdsec-bouncer-traefik-plugin:
        moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
        version: "v1.6.0"

  volumes:
    - name: crowdsec-key
      mountPath: '/crowdsec'
      type: secret
