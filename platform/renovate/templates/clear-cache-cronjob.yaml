apiVersion: batch/v1
kind: CronJob
metadata:
  name: clear-renovate-cache
  labels:
    {{- include "renovate.labels" . | nindent 4 }}
spec:
  schedule: "45 12 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
          containers:
            - name: busybox
              image: busybox
              command: ["sh", "-c"]
              args: ["rm -r /opt/*"]
              volumeMounts:
                - mountPath: /opt
                  name: renovate-cache
              securityContext:
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: [ALL]
          volumes:
            - name: renovate-cache
              persistentVolumeClaim:
                claimName: renovate-cache
