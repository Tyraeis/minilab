---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headplane-integrated
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headplane-integrated
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: headplane-integrated
    spec:
      shareProcessNamespace: true
      serviceAccountName: headplane-integrated
      securityContext:
        fsGroup: 2000
      containers:
        - name: headplane
          image: ghcr.io/tale/headplane:0.7.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HEADPLANE_DEBUG_LOG
              value: {{ .Values.headplane.config.debug | quote }}
            - name: HEADPLANE_LOAD_ENV_OVERRIDES
              value: "true"
            - name: HEADPLANE_INTEGRATION__KUBERNETES__POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: app
              containerPort: 3000
              protocol: TCP
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: headplane-config
              mountPath: /etc/headplane
            - name: headplane-server-cookie-secret
              mountPath: /var/secrets/headplane/server
            - name: headplane-oidc-client-secret
              mountPath: /var/secrets/headplane/oidc
            - name: headplane-oidc-headscale-api-key
              mountPath: /var/secrets/headplane/headscale
            - name: headplane-data
              mountPath: /var/lib/headplane
              readOnly: false
            - name: headscale-config
              mountPath: /etc/headscale
      initContainers:
        - name: headscale
          image: headscale/headscale:0.28.0
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          args:
            - serve
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: grpc
              containerPort: 50443
              protocol: TCP
            - name: stun
              containerPort: 3478
              protocol: UDP
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: headscale-config
              mountPath: /etc/headscale
            - name: headscale-oidc-client-secret
              mountPath: /var/secrets/headscale/oidc
            - name: headscale-data
              mountPath: /var/lib/headscale
              readOnly: false
        {{- if .Values.headplane.config.generateCredentials }}
        - name: generate-headscale-token
          image: alpine/k8s:1.36.2
          env:
            - name: NAMESPACE
              valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
            - name: HEADSCALE_SECRET_NAME
              value: "headscale-api-key"
            - name: HEADSCALE_POD_SELECTOR
              value: "app=headplane-integrated"
          command: [ "bash", "-c" ]
          args: [ "/etc/scripts/ensure-headscale-api-key.sh" ]
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: headplane-scripts
              mountPath: /etc/scripts
        {{- end }}
      volumes:
        ###
        ### Headplane Volumes ###
        ###
        - name: headplane-config
          configMap:
            name: headplane
        - name: headplane-server-cookie-secret
          secret:
            secretName: "headplane-cookie-secret"
        - name: headplane-oidc-client-secret
          secret:
            secretName: "headplane-oidc-client-secret"
        - name: headplane-oidc-headscale-api-key
          secret:
            secretName: "headscale-api-key"
        - name: headplane-data
          persistentVolumeClaim:
            claimName: headplane-data
        {{- if .Values.headplane.config.generateCredentials }}
        - name: headplane-scripts
          configMap:
            name: headplane-scripts
            defaultMode: 0777
        {{- end }}
        ###
        ### Headscale Volumes ###
        ###
        - name: headscale-config
          configMap:
            name: headscale
        - name: headscale-oidc-client-secret
          secret:
            secretName: "headscale-oidc-client-secret"
        - name: headscale-data
          persistentVolumeClaim:
            claimName: headscale-data
